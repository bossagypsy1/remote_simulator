name: Simulate Devices

on:
  schedule:
    - cron: '* * * * *'   # every minute
  workflow_dispatch:       # manual trigger from GitHub UI

jobs:
  simulate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install

      - name: Send one round of payloads
        run: npx ts-node src/index.ts --all --count 1
        env:
          SEND_TO_URL: https://remote-sensor-phone.vercel.app
