<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Remote Simulator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f8f9fa; color: #333; padding: 32px; }
    h1 { font-size: 1.2rem; font-weight: 600; margin-bottom: 4px; }
    p.sub { font-size: 0.8rem; color: #888; margin-bottom: 24px; }
    .card { background: white; border: 1px solid #e5e7eb; border-radius: 8px; overflow: hidden; max-width: 680px; margin-bottom: 16px; }
    .card-header { padding: 12px 16px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; justify-content: space-between; }
    .card-header span { font-size: 0.8rem; font-weight: 500; color: #555; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #d1d5db; display: inline-block; margin-right: 8px; }
    .dot.ok { background: #22c55e; }
    .dot.error { background: #ef4444; }

    /* tables */
    table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    td { padding: 6px 16px; border-bottom: 1px solid #f9fafb; vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    td.dev  { color: #555; font-family: monospace; white-space: nowrap; width: 110px; padding-top: 9px; }
    th { font-size: 0.68rem; text-transform: uppercase; letter-spacing: .04em; color: #aaa;
         padding: 6px 16px; background: #fafafa; border-bottom: 1px solid #f0f0f0; text-align: left; font-weight: 500; }
    th.right { text-align: right; }

    /* badges */
    .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 500; }
    .badge.ok    { background: #f0fdf4; color: #16a34a; }
    .badge.error { background: #fef2f2; color: #dc2626; }
    .badge.wait  { background: #f9fafb; color: #9ca3af; }
    .badge.cron  { background: #faf5ff; color: #7c3aed; }
    .badge.local { background: #fefce8; color: #92400e; }

    /* data chips */
    .chips { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
    .chip  { font-size: 0.68rem; font-family: monospace; background: #f3f4f6; color: #374151;
             border-radius: 3px; padding: 1px 5px; white-space: nowrap; }
    .chip .lbl { color: #9ca3af; margin-right: 2px; }

    /* footers */
    .footer { padding: 10px 16px; border-top: 1px solid #f0f0f0; font-size: 0.72rem; color: #aaa;
              display: flex; justify-content: space-between; align-items: center; gap: 16px; }
    .footer-group { display: flex; flex-direction: column; gap: 2px; }
    .footer-row   { display: flex; align-items: center; gap: 6px; }
    .footer-label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: .04em; color: #d1d5db; }
    .footer-val   { font-size: 0.75rem; color: #6b7280; font-family: monospace; }
    .footer-age   { font-size: 0.68rem; color: #d1d5db; }

    /* misc */
    .time-col { text-align: right; font-family: monospace; color: #888; white-space: nowrap; }
    .source-col { white-space: nowrap; }
    button { font-size: 0.75rem; background: #2563eb; color: white; border: none; border-radius: 4px; padding: 4px 12px; cursor: pointer; }
    button:hover { background: #1d4ed8; }
    button:disabled { background: #93c5fd; cursor: default; }

    .flash { animation: flashbg 1.4s ease-out; }
    @keyframes flashbg { 0% { background: #f0fdf4; } 100% { background: white; } }
  </style>
</head>
<body>
  <h1>Remote Simulator</h1>
  <p class="sub">Triggered by cron-job.org → sends to ingest server</p>

  <!-- Manual send card -->
  <div class="card">
    <div class="card-header">
      <span><span class="dot" id="dot"></span>Manual Send</span>
      <div style="display:flex;gap:8px;align-items:center">
        <button id="auto-btn" onclick="toggleAuto()" style="background:#6b7280">Auto 15s</button>
        <button id="btn" onclick="runNow()">Run Now</button>
      </div>
    </div>
    <table>
      <thead>
        <tr><th>Device</th><th>Result</th></tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
    <div class="footer">
      <div class="footer-group">
        <div class="footer-row">
          <span class="footer-label">Last run</span>
          <span class="footer-val" id="last">—</span>
        </div>
      </div>
      <span id="summary" style="font-size:0.75rem;color:#9ca3af"></span>
    </div>
  </div>

  <!-- Live cron feed card -->
  <div class="card">
    <div class="card-header">
      <span><span class="dot ok"></span>Live Cron Feed</span>
      <span style="font-size:0.7rem;color:#aaa" id="feed-updated">polling…</span>
    </div>
    <table>
      <thead>
        <tr>
          <th>Device</th>
          <th>Source</th>
          <th>Status</th>
          <th class="right">Received</th>
        </tr>
      </thead>
      <tbody id="feed-rows">
        <tr><td colspan="4" style="color:#aaa;text-align:center;padding:16px">Loading…</td></tr>
      </tbody>
    </table>
    <div class="footer">
      <div class="footer-group">
        <div class="footer-row">
          <span class="footer-label">Last run</span>
          <span class="footer-val" id="last-manual-time">—</span>
          <span class="footer-age" id="last-manual-age"></span>
        </div>
        <div class="footer-row">
          <span class="footer-label">Last triggered</span>
          <span class="footer-val" id="last-cron-time">—</span>
          <span class="footer-age" id="last-cron-age"></span>
        </div>
      </div>
      <span id="feed-count" style="font-size:0.72rem;color:#d1d5db"></span>
    </div>
  </div>

  <script>
    const DEVICES = [
      'env-001','env-002','env-003','env-004','env-005','env-006','phone-001'
    ];

    /* ── helpers ── */
    function ageStr(isoStr) {
      const secs = Math.round((Date.now() - new Date(isoStr).getTime()) / 1000);
      if (secs < 60)   return `${secs}s ago`;
      if (secs < 3600) return `${Math.floor(secs/60)}m ${secs%60}s ago`;
      return `${Math.floor(secs/3600)}h ago`;
    }

    function fmtVal(v) {
      if (v === null || v === undefined) return '—';
      const n = Number(v);
      if (isNaN(n)) return String(v);
      const abs = Math.abs(n);
      if (abs === 0)    return '0';
      if (abs >= 1000)  return n.toFixed(1);
      if (abs >= 10)    return n.toFixed(2);
      if (abs >= 1)     return n.toFixed(3);
      return n.toFixed(4);
    }

    // Pick a concise set of readings to display as chips
    // Skip coords (lat/lon handled separately) and very long names
    const SKIP = new Set(['latitude','longitude','1','2']);
    const RENAME = {
      temperature: 'temp', humidity: 'hum', pressure: 'pres',
      battery_level: 'bat', battery_temperature: 'bat_tmp',
      heading: 'hdg', speed: 'spd', altitude: 'alt',
      accelerometer_x: 'ax', accelerometer_y: 'ay', accelerometer_z: 'az',
      gyroscope_x: 'gx', gyroscope_y: 'gy', gyroscope_z: 'gz',
    };

    function buildChips(readings) {
      if (!readings || readings.length === 0) return '';
      // lat/lon special case — show as one chip
      const lat = readings.find(r => r.name === 'latitude' || r.name === '1');
      const lon = readings.find(r => r.name === 'longitude' || r.name === '2');
      const chips = [];
      if (lat && lon) {
        chips.push(`<span class="chip"><span class="lbl">pos</span>${fmtVal(lat.value)},${fmtVal(lon.value)}</span>`);
      }
      for (const r of readings) {
        if (SKIP.has(r.name)) continue;
        const lbl  = RENAME[r.name] ?? r.name.slice(0, 8);
        const val  = r.text ?? fmtVal(r.value);
        chips.push(`<span class="chip"><span class="lbl">${lbl}</span>${val}</span>`);
      }
      return chips.length ? `<div class="chips">${chips.join('')}</div>` : '';
    }

    /* ── Manual send ── */
    let lastManualTime = null;

    function renderWaiting() {
      document.getElementById('rows').innerHTML = DEVICES.map(d => `
        <tr><td class="dev">${d}</td><td><span class="badge wait">waiting</span></td></tr>`).join('');
    }

    function renderResults(results) {
      document.getElementById('rows').innerHTML = results.map(r => `
        <tr>
          <td class="dev">${r.device}</td>
          <td><span class="badge ${r.ok ? 'ok' : 'error'}">${r.ok ? 'sent ' + r.status : 'error ' + r.status}</span></td>
        </tr>`).join('');
    }

    async function runNow() {
      const btn = document.getElementById('btn');
      const dot = document.getElementById('dot');
      btn.disabled = true;
      btn.textContent = 'Sending…';
      dot.className = 'dot';
      renderWaiting();

      try {
        const res  = await fetch('/api/simulate');
        const data = await res.json();
        renderResults(data.results ?? []);
        const ok    = (data.results ?? []).filter(r => r.ok).length;
        const total = (data.results ?? []).length;
        dot.className = ok === total ? 'dot ok' : 'dot error';
        document.getElementById('summary').textContent = `${ok}/${total} ok`;
        lastManualTime = new Date().toISOString();
        document.getElementById('last').textContent = new Date().toLocaleTimeString();
        // also update the cron-card's manual footer
        document.getElementById('last-manual-time').textContent = new Date().toLocaleTimeString();
        document.getElementById('last-manual-age').textContent = '';
      } catch (e) {
        dot.className = 'dot error';
        document.getElementById('last').textContent = 'Error: ' + e.message;
      }

      btn.disabled = false;
      btn.textContent = 'Run Now';
    }

    let autoTimer = null;
    function toggleAuto() {
      const btn = document.getElementById('auto-btn');
      if (autoTimer) {
        clearInterval(autoTimer);
        autoTimer = null;
        btn.textContent = 'Auto 15s';
        btn.style.background = '#6b7280';
      } else {
        runNow();
        autoTimer = setInterval(runNow, 15000);
        btn.textContent = 'Stop Auto';
        btn.style.background = '#dc2626';
      }
    }

    /* ── Live cron feed ── */
    let lastCronIso = null;

    async function pollFeed() {
      try {
        const res  = await fetch('/api/last-run');
        if (!res.ok) return;
        const data = await res.json();
        const { byDevice, lastCron, totalSim } = data;

        // Footer timestamps
        if (lastCron) lastCronIso = lastCron;
        document.getElementById('last-cron-time').textContent =
          lastCronIso ? new Date(lastCronIso).toLocaleTimeString() : '—';
        document.getElementById('last-cron-age').textContent =
          lastCronIso ? `(${ageStr(lastCronIso)})` : '';

        if (lastManualTime) {
          document.getElementById('last-manual-time').textContent = new Date(lastManualTime).toLocaleTimeString();
          document.getElementById('last-manual-age').textContent = `(${ageStr(lastManualTime)})`;
        }

        document.getElementById('feed-count').textContent =
          totalSim != null ? `${totalSim} rows` : '';
        document.getElementById('feed-updated').textContent =
          'updated ' + new Date().toLocaleTimeString();

        // Device rows
        document.getElementById('feed-rows').innerHTML = DEVICES.map(dev => {
          const row = byDevice[dev];
          if (!row) {
            return `<tr>
              <td class="dev">${dev}</td>
              <td class="source-col">—</td>
              <td><span class="badge wait">no data</span></td>
              <td class="time-col">—</td>
            </tr>`;
          }

          const src       = row.simulator_source;
          const srcBadge  = src === 'vercel-cron'
            ? '<span class="badge cron">cron</span>'
            : src === 'local-cli'
            ? '<span class="badge local">local</span>'
            : '—';
          const status      = row.processing_status;
          const statusClass = status === 'ok' ? 'ok' : status === 'error' ? 'error' : 'wait';
          const time        = new Date(row.received_at).toLocaleTimeString();
          const age         = Math.round((Date.now() - new Date(row.received_at).getTime()) / 1000);
          const flashClass  = age < 6 ? 'flash' : '';
          const chips       = buildChips(row.readings_detail);

          return `<tr class="${flashClass}">
            <td class="dev">
              ${dev}
              ${chips}
            </td>
            <td class="source-col">${srcBadge}</td>
            <td><span class="badge ${statusClass}">${status}</span></td>
            <td class="time-col">
              ${time}<br>
              <span style="color:#d1d5db;font-size:0.68rem">${ageStr(row.received_at)}</span>
            </td>
          </tr>`;
        }).join('');

      } catch {
        // silently retry
      }
    }

    /* ── Tick ages every second so they stay fresh ── */
    setInterval(() => {
      if (lastCronIso)   document.getElementById('last-cron-age').textContent   = `(${ageStr(lastCronIso)})`;
      if (lastManualTime) document.getElementById('last-manual-age').textContent = `(${ageStr(lastManualTime)})`;
    }, 1000);

    /* ── Boot ── */
    renderWaiting();
    pollFeed();
    setInterval(pollFeed, 5000);
  </script>
</body>
</html>
