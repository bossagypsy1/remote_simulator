<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Remote Simulator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f8f9fa; color: #333; padding: 32px; }
    h1 { font-size: 1.2rem; font-weight: 600; margin-bottom: 4px; }
    p.sub { font-size: 0.8rem; color: #888; margin-bottom: 24px; }
    .card { background: white; border: 1px solid #e5e7eb; border-radius: 8px; overflow: hidden; max-width: 780px; margin-bottom: 16px; }
    .card-header { padding: 12px 16px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; justify-content: space-between; }
    .card-header span { font-size: 0.8rem; font-weight: 500; color: #555; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #d1d5db; display: inline-block; margin-right: 8px; }
    .dot.ok { background: #22c55e; }
    .dot.error { background: #ef4444; }

    table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    td { padding: 6px 16px; border-bottom: 1px solid #f9fafb; vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    td.dev { color: #555; font-family: monospace; white-space: nowrap; width: 100px; padding-top: 9px; }
    th { font-size: 0.68rem; text-transform: uppercase; letter-spacing: .04em; color: #aaa;
         padding: 6px 16px; background: #fafafa; border-bottom: 1px solid #f0f0f0; text-align: left; font-weight: 500; }
    th.right { text-align: right; }

    .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 500; }
    .badge.ok    { background: #f0fdf4; color: #16a34a; }
    .badge.error { background: #fef2f2; color: #dc2626; }
    .badge.wait  { background: #f9fafb; color: #9ca3af; }

    .chips { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
    .chip  { font-size: 0.68rem; font-family: monospace; background: #f3f4f6; color: #374151;
             border-radius: 3px; padding: 1px 5px; white-space: nowrap; }
    .chip .lbl { color: #9ca3af; margin-right: 2px; }

    .footer { padding: 10px 16px; border-top: 1px solid #f0f0f0; font-size: 0.72rem; color: #aaa;
              display: flex; justify-content: space-between; align-items: center; gap: 16px; }

    .time-col { text-align: right; font-family: monospace; color: #888; white-space: nowrap; }
    button { font-size: 0.75rem; background: #2563eb; color: white; border: none; border-radius: 4px; padding: 4px 12px; cursor: pointer; }
    button:hover { background: #1d4ed8; }
    button:disabled { background: #93c5fd; cursor: default; }

    .flash { animation: flashbg 1.4s ease-out; }
    @keyframes flashbg { 0% { background: #f0fdf4; } 100% { background: white; } }
  </style>
</head>
<body>
  <h1>Remote Simulator</h1>
  <p class="sub">Generates mock sensor data and sends to the ingest server</p>

  <div class="card">
    <div class="card-header">
      <span><span class="dot" id="dot"></span>Send Payloads</span>
      <div style="display:flex;gap:8px;align-items:center">
        <button id="auto-btn" onclick="toggleAuto()" style="background:#6b7280">Auto 15s</button>
        <button id="btn" onclick="runNow()">Run Now</button>
      </div>
    </div>

    <table>
      <thead>
        <tr>
          <th>Device</th>
          <th>Generated readings</th>
          <th>Result</th>
          <th class="right">Sent</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>

    <div class="footer">
      <span id="last-time" style="font-family:monospace;color:#6b7280">—</span>
      <span id="summary" style="font-size:0.75rem;color:#9ca3af"></span>
    </div>
  </div>

  <script>
    const DEVICES = [
      'env-001','env-002','env-003','env-004','env-005','env-006',
      'fuel-001','fuel-002','fuel-003',
      'phone-001'
    ];

    function fmtVal(v) {
      if (v === null || v === undefined) return '—';
      const n = Number(v);
      if (isNaN(n)) return String(v);
      const abs = Math.abs(n);
      if (abs === 0)    return '0';
      if (abs >= 1000)  return n.toFixed(1);
      if (abs >= 10)    return n.toFixed(2);
      if (abs >= 1)     return n.toFixed(3);
      return n.toFixed(4);
    }

    // Short display names for sensor fields
    const RENAME = {
      latitude: 'lat', longitude: 'lon',
      temperature: 'temp', humidity: 'hum', pressure: 'pres', acidity: 'pH',
      tank_level: 'level', tank_temperature: 'temp', tank_pressure: 'pres',
      'location.latitude': 'lat', 'location.longitude': 'lon',
      'location.speed': 'spd', 'location.bearing': 'hdg',
      'accelerometer.x': 'ax', 'accelerometer.y': 'ay', 'accelerometer.z': 'az',
      'gyroscope.x': 'gx', 'gyroscope.y': 'gy', 'gyroscope.z': 'gz',
      'barometer.pressure': 'pres', 'barometer.relativeAltitude': 'alt',
      'compass.magneticBearing': 'hdg',
      'battery.batteryLevel': 'bat%',
      'battery temp.temperature': 'bat°C',
    };

    // Fields to skip (redundant or too verbose)
    const SKIP = new Set(['location.bearing', 'compass.magneticBearing', 'gyroscope.x', 'gyroscope.y', 'gyroscope.z']);

    function buildChips(readings) {
      if (!readings || readings.length === 0) return '<span style="color:#d1d5db;font-size:0.7rem">—</span>';

      // GPS special case: combine lat+lon into one chip
      const lat = readings.find(r => r.name === 'latitude' || r.name === 'location.latitude');
      const lon = readings.find(r => r.name === 'longitude' || r.name === 'location.longitude');
      const shown = new Set();
      const chips = [];

      if (lat && lon) {
        chips.push(`<span class="chip"><span class="lbl">pos</span>${fmtVal(lat.value)},${fmtVal(lon.value)}</span>`);
        shown.add(lat.name); shown.add(lon.name);
      }

      for (const r of readings) {
        if (shown.has(r.name) || SKIP.has(r.name)) continue;
        const lbl = RENAME[r.name] ?? r.name.split('.').pop().slice(0, 8);
        // battery level: convert fraction to %
        const val = r.name === 'battery.batteryLevel'
          ? (r.value * 100).toFixed(0) + '%'
          : fmtVal(r.value);
        chips.push(`<span class="chip"><span class="lbl">${lbl}</span>${val}</span>`);
      }

      return `<div class="chips">${chips.join('')}</div>`;
    }

    function renderWaiting() {
      document.getElementById('rows').innerHTML = DEVICES.map(d => `
        <tr>
          <td class="dev">${d}</td>
          <td><span style="color:#d1d5db;font-size:0.7rem">waiting…</span></td>
          <td><span class="badge wait">—</span></td>
          <td class="time-col">—</td>
        </tr>`).join('');
    }

    function renderResults(results, timestamp) {
      const time = timestamp ? new Date(timestamp).toLocaleTimeString() : new Date().toLocaleTimeString();
      // Build a map for quick lookup
      const byDev = {};
      for (const r of results) byDev[r.device] = r;

      document.getElementById('rows').innerHTML = DEVICES.map(dev => {
        const r = byDev[dev];
        if (!r) return `<tr><td class="dev">${dev}</td><td>—</td><td><span class="badge wait">—</span></td><td class="time-col">—</td></tr>`;
        return `<tr class="flash">
          <td class="dev">${dev}</td>
          <td>${buildChips(r.readings)}</td>
          <td><span class="badge ${r.ok ? 'ok' : 'error'}">${r.ok ? '✓ ' + r.status : '✗ ' + r.status}</span></td>
          <td class="time-col">${time}</td>
        </tr>`;
      }).join('');
    }

    async function runNow() {
      const btn = document.getElementById('btn');
      const dot = document.getElementById('dot');
      btn.disabled = true;
      btn.textContent = 'Sending…';
      dot.className = 'dot';
      renderWaiting();

      try {
        const res  = await fetch('/api/simulate');
        const data = await res.json();
        const results = data.results ?? [];
        renderResults(results, data.timestamp);

        const ok    = results.filter(r => r.ok).length;
        const total = results.length;
        dot.className = ok === total ? 'dot ok' : 'dot error';
        document.getElementById('summary').textContent = `${ok}/${total} sent ok`;
        document.getElementById('last-time').textContent = new Date().toLocaleTimeString();
      } catch (e) {
        dot.className = 'dot error';
        document.getElementById('summary').textContent = 'Error: ' + e.message;
      }

      btn.disabled = false;
      btn.textContent = 'Run Now';
    }

    let autoTimer = null;
    function toggleAuto() {
      const btn = document.getElementById('auto-btn');
      if (autoTimer) {
        clearInterval(autoTimer);
        autoTimer = null;
        btn.textContent = 'Auto 15s';
        btn.style.background = '#6b7280';
      } else {
        runNow();
        autoTimer = setInterval(runNow, 15000);
        btn.textContent = 'Stop Auto';
        btn.style.background = '#dc2626';
      }
    }

    renderWaiting();
  </script>
</body>
</html>
